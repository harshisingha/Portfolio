<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    color: #39ff14;
    overflow: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* CRT flicker */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
    z-index: 99;
  }

  #game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  #title {
    font-size: 28px;
    color: #39ff14;
    text-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14, 0 0 40px #39ff14;
    letter-spacing: 8px;
    animation: flicker 3s infinite;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
    98% { opacity: 0.6; }
    99% { opacity: 1; }
  }

  #scoreboard {
    display: flex;
    gap: 40px;
    font-size: 10px;
    color: #39ff14;
  }

  #scoreboard span { color: #ffffff; }

  #canvas-wrapper {
    position: relative;
    border: 3px solid #39ff14;
    box-shadow: 0 0 15px #39ff14, 0 0 30px rgba(57,255,20,0.3), inset 0 0 15px rgba(57,255,20,0.05);
  }

  canvas {
    display: block;
    background: #050505;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    gap: 20px;
  }

  #overlay h2 {
    font-size: 20px;
    color: #39ff14;
    text-shadow: 0 0 10px #39ff14;
    text-align: center;
    line-height: 1.8;
  }

  #overlay p {
    font-size: 9px;
    color: #aaa;
    text-align: center;
    line-height: 2;
  }

  #start-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    background: transparent;
    color: #39ff14;
    border: 2px solid #39ff14;
    padding: 12px 24px;
    cursor: pointer;
    text-shadow: 0 0 8px #39ff14;
    box-shadow: 0 0 10px rgba(57,255,20,0.4);
    transition: all 0.1s;
    animation: blink-btn 1s step-end infinite;
  }

  @keyframes blink-btn {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #start-btn:hover {
    background: #39ff14;
    color: #000;
    animation: none;
  }

  #controls-hint {
    font-size: 8px;
    color: #555;
    letter-spacing: 1px;
  }

  .game-over-score {
    font-size: 12px;
    color: #ff4444;
    text-shadow: 0 0 8px #ff4444;
  }
</style>
</head>
<body>
<div id="game-container">
  <div id="title">◄ SNAKE ►</div>
  <div id="scoreboard">
    SCORE: <span id="score">0</span> &nbsp;&nbsp; HI: <span id="hi-score">0</span>
  </div>
  <div id="canvas-wrapper">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="overlay">
      <h2>SNAKE</h2>
      <p>EAT THE FOOD<br>DON'T HIT THE WALLS<br>OR YOURSELF</p>
      <button id="start-btn" onclick="startGame()">► PLAY</button>
      <div id="controls-hint">ARROW KEYS TO MOVE</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const hiScoreEl = document.getElementById('hi-score');

const GRID = 20;
const CELL = canvas.width / GRID; // 20px
const SPEED = 150; // ms per tick (medium difficulty)

let snake, dir, nextDir, food, score, hiScore, gameLoop, running;

hiScore = parseInt(localStorage.getItem('snakeHi') || '0');
hiScoreEl.textContent = hiScore;

function startGame() {
  snake = [
    { x: 10, y: 10 },
    { x: 9, y: 10 },
    { x: 8, y: 10 },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  scoreEl.textContent = 0;
  running = true;
  overlay.style.display = 'none';
  placeFood();
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, SPEED);
}

function placeFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * GRID),
      y: Math.floor(Math.random() * GRID)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function tick() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
    return gameOver();
  }

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return gameOver();
  }

  snake.unshift(head);

  // Eat food
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    if (score > hiScore) {
      hiScore = score;
      hiScoreEl.textContent = hiScore;
      localStorage.setItem('snakeHi', hiScore);
    }
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  // Background
  ctx.fillStyle = '#050505';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.fillStyle = 'rgba(57,255,20,0.04)';
  for (let x = 0; x < GRID; x++) {
    for (let y = 0; y < GRID; y++) {
      ctx.fillRect(x * CELL + CELL/2 - 1, y * CELL + CELL/2 - 1, 2, 2);
    }
  }

  // Food — glowing pixel
  const fx = food.x * CELL;
  const fy = food.y * CELL;
  ctx.shadowColor = '#ff4444';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#ff4444';
  ctx.fillRect(fx + 3, fy + 3, CELL - 6, CELL - 6);
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    const sx = seg.x * CELL;
    const sy = seg.y * CELL;
    const alpha = i === 0 ? 1 : Math.max(0.4, 1 - i * 0.03);

    if (i === 0) {
      // Head — bright green glow
      ctx.shadowColor = '#39ff14';
      ctx.shadowBlur = 14;
      ctx.fillStyle = '#39ff14';
    } else {
      ctx.shadowColor = '#39ff14';
      ctx.shadowBlur = 4;
      ctx.fillStyle = `rgba(30, 180, 10, ${alpha})`;
    }
    ctx.fillRect(sx + 1, sy + 1, CELL - 2, CELL - 2);

    // Segment border
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#050505';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx + 1, sy + 1, CELL - 2, CELL - 2);
  });

  ctx.shadowBlur = 0;
}

function gameOver() {
  clearInterval(gameLoop);
  running = false;

  // Flash effect
  let flashes = 0;
  const flash = setInterval(() => {
    ctx.fillStyle = flashes % 2 === 0 ? 'rgba(255,0,0,0.15)' : 'transparent';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    flashes++;
    if (flashes >= 6) {
      clearInterval(flash);
      showGameOver();
    }
  }, 80);
}

function showGameOver() {
  overlay.innerHTML = `
    <h2>GAME<br>OVER</h2>
    <div class="game-over-score">SCORE: ${score}</div>
    ${score >= hiScore && score > 0 ? '<p style="color:#ffdd00;text-shadow:0 0 8px #ffdd00;">★ NEW HIGH SCORE ★</p>' : ''}
    <button id="start-btn" onclick="startGame()" style="font-family:\'Press Start 2P\',monospace;font-size:11px;background:transparent;color:#39ff14;border:2px solid #39ff14;padding:12px 24px;cursor:pointer;text-shadow:0 0 8px #39ff14;">► RETRY</button>
    <div style="font-size:8px;color:#555;letter-spacing:1px;">ARROW KEYS TO MOVE</div>
  `;
  overlay.style.display = 'flex';
}

// Controls
document.addEventListener('keydown', e => {
  if (!running) return;
  const moves = {
    ArrowUp:    { x: 0, y: -1 },
    ArrowDown:  { x: 0, y: 1 },
    ArrowLeft:  { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 },
  };
  const m = moves[e.key];
  if (!m) return;
  e.preventDefault();
  // Prevent reversing
  if (m.x === -dir.x && m.y === -dir.y) return;
  nextDir = m;
});

// Initial draw
ctx.fillStyle = '#050505';
ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
